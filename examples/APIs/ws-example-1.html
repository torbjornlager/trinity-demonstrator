<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>WebSocket Toplevel Demo</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        margin: 2rem auto;
        max-width: 52rem;
        padding: 0 1rem;
      }
      button {
        margin-right: 0.75rem;
        padding: 0.45rem 0.8rem;
      }
      code, pre {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }
      pre {
        background: #f5f5f5;
        border: 1px solid #d9d9d9;
        overflow-x: auto;
        padding: 0.9rem;
        white-space: pre-wrap;
      }
      ul {
        padding-left: 1.2rem;
      }
    </style>
  </head>
  <body>
    <h1>WebSocket API: querying a toplevel</h1>
    <p>
      This page opens <code>/ws</code>, spawns a toplevel session, runs
      <code>member(X,[a,b,c])</code> with <code>limit=2</code>, and then asks
      for the remaining solutions with <code>toplevel_next</code>.
    </p>

    <p>
      <button id="run-button" type="button">Run demo</button>
      <button id="clear-button" type="button">Clear log</button>
    </p>

    <h2>Results</h2>
    <ul id="results"></ul>

    <h2>Event log</h2>
    <pre id="log"></pre>

    <script>
      (function() {
        var runButton = document.getElementById("run-button");
        var clearButton = document.getElementById("clear-button");
        var results = document.getElementById("results");
        var logNode = document.getElementById("log");
        var socket = null;
        var sessionPid = null;

        function clearLog() {
          results.textContent = "";
          logNode.textContent = "";
        }

        function logLine(text) {
          logNode.textContent += text + "\n";
        }

        function addResult(text) {
          var item = document.createElement("li");
          item.textContent = text;
          results.appendChild(item);
        }

        function wsURL() {
          var protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
          return protocol + "//" + window.location.host + "/ws";
        }

        function sendJSON(payload) {
          logLine(">> " + JSON.stringify(payload));
          socket.send(JSON.stringify(payload));
        }

        function closeSocket() {
          if (socket) {
            try {
              socket.close();
            } catch (_error) {
            }
          }
          socket = null;
          sessionPid = null;
        }

        function runDemo() {
          var currentSocket;

          closeSocket();
          clearLog();
          runButton.disabled = true;

          currentSocket = new WebSocket(wsURL());
          socket = currentSocket;

          currentSocket.onopen = function() {
            if (socket !== currentSocket) {
              return;
            }
            sendJSON({
              command: "toplevel_spawn",
              options: "[]"
            });
          };

          currentSocket.onmessage = function(message) {
            if (socket !== currentSocket) {
              return;
            }
            var event = JSON.parse(message.data);
            logLine("<< " + JSON.stringify(event));
            if (event.type === "spawned") {
              sessionPid = event.pid;
              sendJSON({
                command: "toplevel_call",
                pid: sessionPid,
                goal: "member(X,[a,b,c])",
                template: "X",
                limit: 2
              });
              return;
            }
            if (event.type === "success") {
              event.data.forEach(function(row) {
                addResult(row.X);
              });
              if (event.more) {
                sendJSON({
                  command: "toplevel_next",
                  pid: sessionPid,
                  limit: 2
                });
              } else {
                sendJSON({
                  command: "toplevel_abort",
                  pid: sessionPid
                });
              }
              return;
            }
            if (event.type === "abort" || event.type === "down") {
              runButton.disabled = false;
              closeSocket();
              return;
            }
            if (event.type === "error") {
              runButton.disabled = false;
            }
          };

          currentSocket.onerror = function() {
            if (socket !== currentSocket) {
              return;
            }
            logLine("WebSocket error");
            runButton.disabled = false;
          };

          currentSocket.onclose = function() {
            if (socket !== currentSocket) {
              return;
            }
            socket = null;
            sessionPid = null;
            runButton.disabled = false;
          };
        }

        clearButton.addEventListener("click", clearLog);
        runButton.addEventListener("click", runDemo);
        runDemo();
      })();
    </script>
  </body>
</html>
