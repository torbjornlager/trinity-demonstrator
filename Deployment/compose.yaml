      WEB_PROLOG_AGENT_TOKEN: ${WEB_PROLOG_AGENT_TOKEN:-}
    volumes:
      - interaction_logs:/var/log/webprolog
    ports:
      - "127.0.0.1:3052:3052"
    expose:
      - "3052"
    networks:
      - wp_net
    mem_limit: 768m
    cpus: 0.75
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  wp_n3:
