services:
  caddy:
    build:
      context: ..
      dockerfile: Deployment/Dockerfile.caddy
    restart: unless-stopped
    depends_on:
      - wp_n1
      - wp_n2
      - wp_n3
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - wp_net
    mem_limit: 256m
    cpus: 0.50

  wp_n1:
    build:
      context: ..
      dockerfile: Deployment/Dockerfile
    command: ["swipl", "-q", "-s", "/app/Deployment/start_n1.pl", "-g", "start_n1_forever", "-t", "halt"]
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m
    environment:
      HOME: /tmp
      TZ: Europe/Stockholm
      WEB_PROLOG_INTERACTION_LOG: /var/log/webprolog/interactions.jsonl
      WEB_PROLOG_VIEWER_TOKEN: ${WEB_PROLOG_VIEWER_TOKEN:-}
      WEB_PROLOG_AGENT_TOKEN: ${WEB_PROLOG_AGENT_TOKEN:-}
    volumes:
      - interaction_logs:/var/log/webprolog
    ports:
      - "127.0.0.1:3051:3051"
    expose:
      - "3051"
    networks:
      - wp_net
    mem_limit: 512m
    cpus: 0.50
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  wp_n2:
    build:
      context: ..
      dockerfile: Deployment/Dockerfile
    command: ["swipl", "-q", "-s", "/app/Deployment/start_n2.pl", "-g", "start_n2_forever", "-t", "halt"]
    restart: unless-stopped
    init: true
    read_only: true
