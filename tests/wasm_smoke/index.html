<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Statechart WASM smoke test</title>
  <style>
    body { font-family: ui-monospace, Menlo, monospace; padding: 1em; }
    .pass { color: #0a0; }
    .fail { color: #c00; font-weight: bold; }
    .info { color: #555; }
    #log { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Statechart WASM smoke test</h2>
  <div id="status">Loading…</div>
  <hr>
  <div id="log"></div>

  <script src="https://wasm.swi-prolog.org/wasm/swipl-bundle.js"></script>
  <script>
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('status');

    function log(kind, msg) {
      const line = document.createElement('div');
      line.className = kind;
      line.textContent = (kind === 'pass' ? 'PASS  ' : kind === 'fail' ? 'FAIL  ' : '      ') + msg;
      logEl.appendChild(line);
      console[kind === 'fail' ? 'error' : 'log']('[smoke]', msg);
    }

    // Test counters; preview_eval can read window.__smokeResult after run.
    window.__smokeResult = { passed: 0, failed: 0, errors: [] };

    function assert(cond, msg) {
      if (cond) {
        log('pass', msg);
        window.__smokeResult.passed++;
      } else {
        log('fail', msg);
        window.__smokeResult.failed++;
        window.__smokeResult.errors.push(msg);
      }
    }

    async function fetchText(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error('fetch ' + url + ' -> ' + r.status);
      return r.text();
    }

    async function main() {
      // Files (relative to project root, served by the static server).
      const files = {
        '/wasm/statechart_wasm_runtime.pl': '/src/wasm/statechart_wasm_runtime.pl',
        '/wasm/statechart_wasm_model.pl':   '/src/wasm/statechart_wasm_model.pl',
        '/wasm/statechart_wasm_exec.pl':    '/src/wasm/statechart_wasm_exec.pl',
        '/wasm/statechart_wasm.pl':         '/src/wasm/statechart_wasm.pl'
      };
      const chartURL = '/examples/statecharts/01 pause-and-resume.xml';

      statusEl.textContent = 'Booting SWI-Prolog WASM…';
      const Module = await SWIPL({ arguments: ['-q', '--nosignals'] });
      const Prolog = Module.prolog;
      window.__Prolog = Prolog;
      window.__Module = Module;

      log('info', 'SWI-Prolog WASM ready, version=' + Prolog.query('current_prolog_flag(version, V)', {}).once().V);

      // Preload libraries used by our modules.
      for (const m of ['lists', 'apply', 'option', 'sort', 'sgml']) {
        try { Prolog.query('use_module(library(' + m + '))').once(); }
        catch(e) { log('fail', 'preload library(' + m + ') threw: ' + e); }
      }
      log('info', 'libraries preloaded');

      // Materialize source modules in the virtual FS.
      Module.FS.mkdir('/wasm');
      for (const dest in files) {
        const src = await fetchText(files[dest]);
        Module.FS.writeFile(dest, src);
      }
      log('info', 'modules written to /wasm/');

      // Consult the public facade — pulls in the other three.
      try {
        Prolog.query("use_module('/wasm/statechart_wasm.pl')").once();
        log('pass', 'consulted statechart_wasm.pl');
      } catch(e) {
        log('fail', 'consult failed: ' + e);
        statusEl.textContent = 'Consult failed.';
        window.__smokeResult.done = true;
        return;
      }

      // Fetch a chart and inline it via term_string into a statechart_start call.
      const chartText = await fetchText(chartURL);
      window.__chartText = chartText;

      // Use Prolog.bindings to pass the chart text safely.
      function once(goal, bindings) {
        try { return Prolog.query(goal, bindings || {}).once(); }
        catch(e) { log('fail', 'query <' + goal + '> threw: ' + e); throw e; }
      }
      // succeeds(goal) returns true iff the goal has a solution.
      // Prolog.query.once() returns an object {bindings:{...}, ...} on
      // success and an object with success===false on failure — be
      // robust to both shapes by checking the explicit success flag
      // when present.
      function succeeds(goal) {
        const r = Prolog.query(goal).once();
        if (r && typeof r === 'object' && 'success' in r) return !!r.success;
        return !!r;
      }
      function configList() {
        const r = Prolog.query('statechart_configuration(C)').once();
        // r.C is a JS array on success.
        return (r && r.C) ? r.C : [];
      }
      function inState(s) {
        // Inline the atom into the goal string to avoid any binding
        // substitution surprises. State IDs are simple atoms here.
        return succeeds('statechart_in(' + s + ')');
      }

      // ---------- the actual smoke test ----------
      try {
        // Start the pause-and-resume chart from text.
        once('statechart_start(text(T))', { T: chartText });
        let C = configList();
        log('info', 'initial config: ' + JSON.stringify(C));
        assert(C.includes('s1'),   'initial config contains s1');
        assert(C.includes('play'), 'initial config contains play');
        assert(C.includes('game'), 'initial config contains game');

        once('statechart_send(play)');
        assert(inState('s2'),  'after play -> in s2');
        assert(!inState('s1'), 'after play -> not in s1');

        once('statechart_send(pause)');
        assert(inState('interrupted'), 'after pause -> in interrupted');
        assert(!inState('play'),       'after pause -> not in play');

        once('statechart_send(resume)');
        assert(inState('play'), 'after resume -> back in play (via history)');
        assert(inState('s2'),   'after resume -> back in s2 (history remembered)');

        once('statechart_send(stop)');
        assert(!succeeds('statechart_running'), 'after stop -> interpreter no longer running');

        once('statechart_stop');
        log('info', 'final cleanup ok');
      } catch(e) {
        log('fail', 'smoke test threw: ' + e);
      }

      const { passed, failed } = window.__smokeResult;
      window.__smokeResult.done = true;
      statusEl.innerHTML = failed === 0
        ? '<span class="pass">All ' + passed + ' smoke checks passed.</span>'
        : '<span class="fail">' + failed + ' of ' + (passed + failed) + ' checks FAILED.</span>';
    }

    main().catch(e => {
      log('fail', 'main threw: ' + e);
      window.__smokeResult.done = true;
      window.__smokeResult.failed++;
      statusEl.textContent = 'Smoke test errored.';
    });
  </script>
</body>
</html>
